version: "3.9"

# ─── Tablo self-hosted stack ──────────────────────────────────────────────────
#
# Default mode (LiveKit Cloud):
#   docker compose up qdrant -d
#   Set LIVEKIT_URL=wss://your-project.livekit.cloud in backend/.env
#
# Self-hosted mode (open-source LiveKit):
#   docker compose --profile livekit up -d
#   Set LIVEKIT_URL=ws://localhost:7880 in backend/.env
#   (or wss://your-domain:7880 with TLS in production)
#
# Both modes use the same backend, agent, and Qdrant — only LIVEKIT_URL differs.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Qdrant vector store ────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: tablo-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
      - ./qdrant_backups:/qdrant/snapshots
    restart: unless-stopped

  # ── LiveKit server (self-hosted, open-source) ──────────────────────────────
  # Only starts when you run: docker compose --profile livekit up
  # Uses livekit.yaml for config (API key/secret must match backend/.env)
  livekit:
    image: livekit/livekit-server:latest
    container_name: tablo-livekit
    command: --config /etc/livekit/livekit.yaml
    ports:
      - "7880:7880"   # HTTP/WebSocket signaling
      - "7881:7881"   # TURN/TLS (optional)
      - "50100-50200:50100-50200/udp"  # WebRTC media UDP range
    volumes:
      - ./livekit.yaml:/etc/livekit/livekit.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7880/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tablo-backend
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - LIVEKIT_URL=ws://livekit:7880
    volumes:
      - ./backend/data/uploads:/app/data/uploads
      - ./backend/data/learner_profiles:/app/data/learner_profiles
      - ./backend/data/sessions:/app/data/sessions
      - ./backend/data/learner_sessions:/app/data/learner_sessions
    depends_on:
      - qdrant
    restart: unless-stopped

  # ── Production backend (profile: prod) ───────────────────────────────────
  backend-prod:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: tablo-backend-prod
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - LIVEKIT_API_KEY_FILE=/run/secrets/livekit_api_key
      - LIVEKIT_API_SECRET_FILE=/run/secrets/livekit_api_secret
      - GOOGLE_API_KEY_FILE=/run/secrets/google_api_key
    volumes:
      - ./backend/data/uploads:/app/data/uploads
      - ./backend/data/learner_profiles:/app/data/learner_profiles
      - ./secrets:/run/secrets:ro
    depends_on:
      - qdrant
    restart: unless-stopped
    profiles:
      - prod

  # ── Agent worker ───────────────────────────────────────────────────────────
  # Run with: docker compose --profile agent up agent
  agent:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tablo-agent
    command: python agent.py dev
    env_file:
      - ./.env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - LIVEKIT_URL=ws://livekit:7880
      - AGENT_METRICS_ENABLED=true
      - AGENT_METRICS_PORT=9091
    volumes:
      - ./backend/data/uploads:/app/data/uploads
      - ./backend/data/learner_profiles:/app/data/learner_profiles
      - ./backend/data/sessions:/app/data/sessions
      - ./backend/data/learner_sessions:/app/data/learner_sessions
    depends_on:
      - qdrant

  # ── Frontend Next.js app ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tablo-frontend
    ports:
      - "3000:3000"
    env_file:
      - ./.env
    depends_on:
      - backend
    restart: unless-stopped

  # ── Production agent worker (profile: prod) ──────────────────────────────
  agent-prod:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: tablo-agent-prod
    command: python agent.py dev
    env_file:
      - ./backend/.env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - LIVEKIT_API_KEY_FILE=/run/secrets/livekit_api_key
      - LIVEKIT_API_SECRET_FILE=/run/secrets/livekit_api_secret
      - GOOGLE_API_KEY_FILE=/run/secrets/google_api_key
      - AGENT_METRICS_ENABLED=true
      - AGENT_METRICS_PORT=9091
    volumes:
      - ./backend/data/uploads:/app/data/uploads
      - ./backend/data/learner_profiles:/app/data/learner_profiles
      - ./secrets:/run/secrets:ro
    depends_on:
      - qdrant
    profiles:
      - prod

  # ── Observability stack (Prometheus + Grafana + Loki) ────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: tablo-prometheus
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "9090:9090"
    profiles:
      - observability

  grafana:
    image: grafana/grafana:latest
    container_name: tablo-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/etc/grafana/dashboards:ro
    profiles:
      - observability

  loki:
    image: grafana/loki:2.9.8
    container_name: tablo-loki
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./observability/loki-config.yml:/etc/loki/config.yml:ro
    ports:
      - "3100:3100"
    profiles:
      - observability

  promtail:
    image: grafana/promtail:2.9.8
    container_name: tablo-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./observability/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    profiles:
      - observability

  # ── Vault (dev-only secrets manager) ─────────────────────────────────────
  vault:
    image: hashicorp/vault:1.15
    container_name: tablo-vault
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=tablo-dev-token
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    profiles:
      - secrets

  # ── Maintenance helpers ─────────────────────────────────────────────────
  qdrant-backup:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tablo-qdrant-backup
    command: python scripts/qdrant_snapshot.py
    environment:
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./qdrant_backups:/qdrant/snapshots
      - ./backend/scripts:/app/scripts:ro
    depends_on:
      - qdrant
    profiles:
      - maintenance

  qdrant-migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tablo-qdrant-migrate
    command: python scripts/qdrant_migrate.py
    environment:
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./backend/scripts:/app/scripts:ro
    depends_on:
      - qdrant
    profiles:
      - maintenance

volumes:
  qdrant_data:
