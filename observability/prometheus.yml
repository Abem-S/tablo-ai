global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: tablo-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]

  - job_name: tablo-agent
    metrics_path: /metrics
    static_configs:
      - targets: ["agent:9091"]

  - job_name: qdrant
    metrics_path: /metrics
    static_configs:
      - targets: ["qdrant:6333"]
